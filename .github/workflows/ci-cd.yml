name: CI/CD Pipeline

on:

  push:
    branches:
      - main

  pull_request:

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          cd app
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          cd app
          pytest

  docker:

    needs: test

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t ci-cd-demo .

      - name: Run Container
        run: |
          docker run -d -p 5000:5000 ci-cd-demo

      - name: Check API
        run: |
          sleep 10
          curl http://localhost:5000